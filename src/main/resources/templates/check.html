<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${appName}">Check Placement Eligibility</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        nav {
            background-color: #333;
            padding: 10px;
            margin: -20px -20px 20px -20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        h1, h2 {
            color: #333;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            max-width: 500px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="checkbox"] {
            margin-right: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            color: #2196F3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/check">Check Placement Eligibility</a>
        <a href="/search">Search Student</a>
        <a href="/students">All Students</a>
    </nav>

    <h1 th:text="${appName}">Student Eligibility Checker</h1>

    <h2>Check Placement Eligibility</h2>
    <form th:action="@{/check}" th:object="${student}" method="post">
        <label for="studentId">Student ID:</label>
        <input type="text" th:field="*{studentId}" id="studentId" required /><br/><br/>

        <label for="name">Name:</label>
        <input type="text" th:field="*{name}" id="name" required /><br/><br/>

        <label for="cgpa">CGPA (%):</label>
        <input type="number" step="0.1" th:field="*{cgpa}" id="cgpa" required /><br/><br/>

        <label for="backlog">Has Backlog:</label>
        <input type="checkbox" th:field="*{backlog}" id="backlog" /><br/><br/>

        <button type="submit">Check Placement Eligibility</button>
    </form>

    <a href="/">Back to Home</a>
</body>
</html>
